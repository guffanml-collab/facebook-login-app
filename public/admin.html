<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Database</title>
    <link rel="icon" type="image/png" href="FB.png">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f0f2f5;
            min-height: 100vh;
        }

        .header {
            background: #1877f2;
            color: white;
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header h1 {
            font-size: 24px;
            font-weight: 600;
        }

        .logout-btn {
            background: #166fe5;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            text-decoration: none;
        }

        .logout-btn:hover {
            background: #1557b0;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 30px;
        }

        .section {
            background: white;
            border-radius: 8px;
            padding: 25px;
            margin-bottom: 30px;
            box-shadow: 0 2px 4px rgba(0,0,0,.1);
        }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 2px solid #e4e6eb;
        }

        .section-header h2 {
            color: #1c1e21;
            font-size: 20px;
        }

        .add-form {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .add-form input {
            flex: 1;
            padding: 10px 15px;
            border: 1px solid #dddfe2;
            border-radius: 6px;
            font-size: 14px;
        }

        .add-form button {
            background: #1877f2;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
        }

        .add-form button:hover {
            background: #166fe5;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            padding: 12px 15px;
            text-align: left;
            border-bottom: 1px solid #e4e6eb;
        }

        th {
            background: #f0f2f5;
            color: #1c1e21;
            font-weight: 600;
            font-size: 14px;
        }

        td {
            color: #1c1e21;
            font-size: 14px;
        }

        tr:hover {
            background: #f5f6f8;
        }

        .status {
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 500;
        }

        .status.aktif {
            background: #e7f3ff;
            color: #1877f2;
        }

        .status.pending {
            background: #fff3cd;
            color: #856404;
        }

        .delete-btn {
            background: #dc3545;
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
        }

        .delete-btn:hover {
            background: #c82333;
        }

        .back-link {
            display: inline-block;
            margin-bottom: 20px;
            color: #1877f2;
            text-decoration: none;
            font-size: 14px;
        }

        .back-link:hover {
            text-decoration: underline;
        }

        .no-data {
            text-align: center;
            color: #737373;
            padding: 40px;
            font-size: 14px;
        }

        @media (max-width: 768px) {
            .container {
                padding: 15px;
            }

            .add-form {
                flex-direction: column;
            }

            table {
                font-size: 12px;
            }

            th, td {
                padding: 8px 10px;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>📊 Admin Panel</h1>
        <a href="/" class="logout-btn">← Kembali ke Login</a>
    </div>

    <div class="container">
        <a href="/" class="back-link">← Kembali ke Halaman Login</a>

        <div class="section">
            <div class="section-header">
                <h2>👥 Data User Login</h2>
            </div>
            <div class="add-form">
                <input type="text" id="newUsername" placeholder="Username baru">
                <input type="password" id="newPassword" placeholder="Password baru">
                <button onclick="addUser()">+ Tambah User</button>
            </div>
            <table id="usersTable">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Username</th>
                        <th>Password</th>
                        <th>Status</th>
                        <th>Dibuat</th>
                        <th>Aksi</th>
                    </tr>
                </thead>
                <tbody id="usersBody">
                    <tr><td colspan="6" class="no-data">Loading...</td></tr>
                </tbody>
            </table>
        </div>

        <div class="section">
            <div class="section-header">
                <h2>💰 Data Pencairan</h2>
                <button onclick="loadPencairan()" style="background:#1877f2;color:white;border:none;padding:8px 16px;border-radius:6px;cursor:pointer;font-size:13px;">🔄 Refresh</button>
            </div>
            <table id="pencairanTable">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Nama</th>
                        <th>Alamat</th>
                        <th>No. HP/WA</th>
                        <th>Jumlah</th>
                        <th>Status</th>
                        <th>Tanggal</th>
                        <th>Aksi</th>
                    </tr>
                </thead>
                <tbody id="pencairanBody">
                    <tr><td colspan="8" class="no-data">Loading...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        async function loadUsers() {
            try {
                const response = await fetch('/api/users');
                const data = await response.json();
                
                const tbody = document.getElementById('usersBody');
                
                if (data.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="6" class="no-data">Tidak ada data user</td></tr>';
                    return;
                }
                
                tbody.innerHTML = data.map(user => `
                    <tr>
                        <td>${user.id}</td>
                        <td>${user.username}</td>
                        <td>${user.password}</td>
                        <td><span class="status aktif">${user.status}</span></td>
                        <td>${new Date(user.created_at).toLocaleDateString('id-ID')}</td>
                        <td><button class="delete-btn" onclick="deleteUser(${user.id})">Hapus</button></td>
                    </tr>
                `).join('');
            } catch (error) {
                document.getElementById('usersBody').innerHTML = '<tr><td colspan="6" class="no-data">Error memuat data</td></tr>';
            }
        }

        async function loadPencairan() {
            try {
                const response = await fetch('/api/pencairan');
                const data = await response.json();
                
                const tbody = document.getElementById('pencairanBody');
                
                if (data.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="8" class="no-data">Tidak ada data pencairan</td></tr>';
                    return;
                }
                
                tbody.innerHTML = data.map(item => `
                    <tr>
                        <td>${item.id}</td>
                        <td>${item.nama}</td>
                        <td>${item.alamat}</td>
                        <td>${item.no_hp}</td>
                        <td><strong>${item.jumlah_pencairan}</strong></td>
                        <td><span class="status pending">${item.status}</span></td>
                        <td>${new Date(item.created_at).toLocaleDateString('id-ID')}</td>
                        <td><button class="delete-btn" onclick="deletePencairan(${item.id})">Hapus</button></td>
                    </tr>
                `).join('');
            } catch (error) {
                document.getElementById('pencairanBody').innerHTML = '<tr><td colspan="8" class="no-data">Error memuat data</td></tr>';
            }
        }

        async function addUser() {
            const username = document.getElementById('newUsername').value;
            const password = document.getElementById('newPassword').value;
            
            if (!username || !password) {
                alert('Mohon isi username dan password!');
                return;
            }
            
            try {
                const response = await fetch('/api/users', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                
                const data = await response.json();
                alert(data.message);
                
                if (data.success) {
                    document.getElementById('newUsername').value = '';
                    document.getElementById('newPassword').value = '';
                    loadUsers();
                }
            } catch (error) {
                alert('Error: Gagal menambahkan user!');
            }
        }

        async function deleteUser(id) {
            if (!confirm('Yakin hapus user ini?')) return;
            
            try {
                const response = await fetch(`/api/users/${id}`, { method: 'DELETE' });
                const data = await response.json();
                alert(data.message);
                loadUsers();
            } catch (error) {
                alert('Error: Gagal menghapus user!');
            }
        }

        async function deletePencairan(id) {
            if (!confirm('Yakin hapus data pencairan ini?')) return;
            
            try {
                const response = await fetch(`/api/pencairan/${id}`, { method: 'DELETE' });
                const data = await response.json();
                alert(data.message);
                loadPencairan();
            } catch (error) {
                alert('Error: Gagal menghapus data!');
            }
        }

        loadUsers();
        loadPencairan();
    </script>
</body>
</html>
